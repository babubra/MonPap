<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MonPap" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MonPap</title>
  </head>
  <body>
    <!-- Синхронный оверлей блокировки: показывается ДО загрузки React, если PIN включён -->
    <!-- Убирается в useAppLock.ts после инициализации -->
    <script>
      (function() {
        var theme = localStorage.getItem('monpap_theme') || 'dark';
        var lockEnabled = localStorage.getItem('monpap_lock_enabled') === 'true';
        if (lockEnabled) {
          var splash = document.createElement('div');
          splash.id = 'lock-splash';
          splash.style.cssText = [
            'position:fixed',
            'inset:0',
            'z-index:99999',
            'background:' + (theme === 'light' ? '#faf7f2' : '#0e1028'),
            'display:flex',
            'flex-direction:column',
            'align-items:center',
            'justify-content:center',
            'font-family:system-ui,sans-serif',
          ].join(';');
          splash.innerHTML = '<span style="font-size:2rem;font-weight:700;color:#d5a341;letter-spacing:0.04em;">MonPap</span>';
          document.documentElement.appendChild(splash);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
