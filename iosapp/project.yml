# Xcode project spec для XcodeGen
# Документация: https://github.com/yonaskolb/XcodeGen/blob/master/Docs/ProjectSpec.md
name: MonPap
options:
  bundleIdPrefix: com.monpap
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: ru
  knownRegions:
    - ru
    - en

targets:
  MonPap:
    type: application
    platform: iOS
    sources:
      - MonPap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monpap.ios
        PRODUCT_NAME: MonPap
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MonPap использует микрофон для голосового ввода транзакций"
        INFOPLIST_KEY_NSCameraUsageDescription: "MonPap использует камеру для сканирования чеков"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "MonPap использует Face ID для быстрой разблокировки"
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        # Разрешаем HTTP для localhost в debug
        INFOPLIST_KEY_NSAppTransportSecurity_AllowsArbitraryLoads: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
